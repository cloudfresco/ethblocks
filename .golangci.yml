version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  go: "1.25"

linters:
  default: none
  enable:
    - bodyclose
    - depguard
    - durationcheck
    - errcheck
    - errorlint
    - gocritic
    - gosec
    - govet
    - ineffassign
    - misspell
    - nilerr
    - nilnesserr
    - nilnil
    - nolintlint
    - revive
    - staticcheck
    - unconvert
    - wastedassign
  settings:
    depguard:
      rules:
        main:
          deny:
            - pkg: github.com/golang/protobuf/jsonpb
              desc: don't use the jsonpb package; use util/protomarshal instead
            - pkg: google.golang.org/protobuf/encoding/protojson
              desc: don't use the protojson package directly; use util/protomarshal instead
    errcheck:
      check-type-assertions: false
      check-blank: false
    gosec:
      includes:
        - G401
        - G402
        - G404
    govet:
      enable:
        - copylocks
        - lostcancel
        - printf
        - slog
        - structtag
        - tests
        - unreachable
        - unusedresult
    revive:
      confidence: 0
      severity: warning
      rules:
        - name: blank-imports
        - name: context-keys-type
        - name: time-naming
        - name: var-declaration
        - name: unexported-return
        - name: errorf
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: increment-decrement
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: superfluous-else
        - name: modifies-parameter
        - name: unreachable-code
        - name: struct-tag
        - name: constant-logical-expr
        - name: bool-literal-in-expr
        - name: redefines-builtin-id
        - name: imports-blacklist
        - name: range-val-in-closure
        - name: range-val-address
        - name: waitgroup-by-value
        - name: atomic
        - name: call-to-gc
        - name: duplicated-imports
        - name: string-of-int
        - name: defer
          arguments:
            - - call-chain
        - name: unconditional-recursion
        - name: identical-branches
      error-code: 2
      warning-code: 1
    staticcheck:
      checks:
        - all
        - "-ST1000"
        - "-ST1003"
        - "-ST1005"
        - "-QF*"
    unparam:
      check-exported: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
          - maligned
        path: _test\.go$|^tests/|^samples/
      - linters:
          - staticcheck
        text: 'SA1019: package github.com/golang/protobuf/jsonpb'
      - linters:
          - staticcheck
        text: 'SA1019: "github.com/golang/protobuf/jsonpb"'
      - path: (.+)\.go$
        text: composite literal uses unkeyed fields
      - path: (.+)\.go$
        text: 'ST1000: at least one file in a package should have a package comment'
      - path: (.+)\.go$
        text: 'ST1003: Poorly chosen identifier'
      - path: (.+)\.go$
        text: 'ST1005: Incorrectly formatted error string'
    paths:
      - internal/proto$
      - internal/proto-gen$
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gci:
      sections:
        - standard
        - default
  exclusions:
    generated: lax
    paths:
      - internal/proto$
      - internal/proto-gen$
      - third_party$
      - builtin$
      - examples$

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      path: stdout
      colors: true
  show-stats: true
  sort-order:
    - linter
    - file
